<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>붉은사막 파밍 아틀라스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Crimson Desert Atlas</p>
        <h1 id="appTitle">붉은사막 파밍 아틀라스</h1>
        <p id="appSubtitle" class="subtitle">점에 마우스를 올리면 아이템을 확인하고, 클릭하면 우측에서 확대된 세부 위치를 봅니다.</p>
      </div>

      <div class="topbar-actions">
        <label class="search-shell" aria-label="아이템 검색">
          <input id="searchInput" type="search" placeholder="아이템 / 스팟 검색">
        </label>
        <a id="mapSourceLink" class="source-link" href="#" target="_blank" rel="noreferrer">원본 맵</a>
      </div>
    </header>

    <main class="atlas-grid">
      <section class="world-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">World Map</p>
            <h2>파이웰 전체 대륙 지도</h2>
          </div>
          <p id="resultsCount" class="results-count"></p>
        </div>

        <div id="worldMap" class="world-map">
          <img id="worldImage" class="world-image" src="assets/pywel-main-world-z11.jpg" alt="붉은사막 파이웰 전체지도" draggable="false">
          <div id="worldMarkers" class="marker-layer" aria-live="polite"></div>
        </div>

        <div class="legend-wrap">
          <p class="legend-label">범례</p>
          <div id="legend" class="legend"></div>
        </div>
      </section>

      <aside id="focusPanel" class="focus-panel"></aside>
    </main>
  </div>

  <script src="data/guideData.js"></script>
  <script src="app.js"></script>
</body>
</html>
